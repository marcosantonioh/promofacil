<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoFácil - Cadastro de Produtos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>PromoFácil</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="promocoes.html">Promoções</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="produtos.html">Cadastrar Produto</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="produtos">
                <h2>Cadastro de Produtos</h2>
                <form id="cadastroProdutoForm">
                    <input type="text" id="produtoNome" placeholder="Nome do Produto" required>
                    <input type="text" id="produtoTipo" placeholder="Tipo do Produto" required>
                    <input type="date" id="produtoValidade" placeholder="Validade" required>
                    <input type="number" id="produtoPreco" placeholder="Preço" required>
                    <input type="number" id="produtoQuantidade" placeholder="Quantidade em Estoque" required>
                    <input type="file" id="produtoFoto" accept="image/*" required>
                    <button type="submit">Cadastrar Produto</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 PromoFácil. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
